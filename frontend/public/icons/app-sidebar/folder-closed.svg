      <stop offset="0.5" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#8A5A0A" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="rimBack" x1="0" y1="0" x2="0" y2="1">
